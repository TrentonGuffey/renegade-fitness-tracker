<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Renegade Fitness Tracker</title>
    <link rel="stylesheet" href="css/style.css" />
</head>
<body class="auth-page">

    <div class="auth-container">
        <div class="auth-header">
            <h1>RENEGADE</h1>
            <p>Fitness Tracker</p>
        </div>

        <!-- Tab Toggle -->
        <div class="auth-tabs">
            <button class="tab-btn active" id="loginTab" onclick="showTab('login')">Sign In</button>
            <button class="tab-btn" id="signupTab" onclick="showTab('signup')">Create Account</button>
        </div>

        <!-- Login Form -->
        <div class="auth-form" id="loginForm">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="loginEmail" placeholder="your@email.com" />
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="loginPassword" placeholder="••••••••••" />
            </div>
            <div class="form-group">
                <label id="mfaLabel" style="display:none">Authenticator Code</label>
                <input type="text" id="mfaCode" placeholder="6-digit code" style="display:none" />
            </div>
            <button class="btn-primary" onclick="handleLogin()">Sign In</button>
            <p class="auth-link" onclick="showForgotPassword()">Forgot your password?</p>
        </div>

        <!-- Signup Form -->
        <div class="auth-form" id="signupForm" style="display:none">
            <div class="form-group">
                <label>Display Name</label>
                <input type="text" id="signupName" placeholder="Your name" />
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="signupEmail" placeholder="your@email.com" />
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="signupPassword" placeholder="Min 10 characters" />
            </div>
            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" id="signupConfirm" placeholder="Repeat password" />
            </div>
            <button class="btn-primary" onclick="handleSignup()">Create Account</button>
            <p class="auth-note">You'll receive a confirmation email before you can sign in.</p>
        </div>

        <!-- Message Area -->
        <div class="auth-message" id="authMessage"></div>
    </div>

    <script type="module" src="js/auth.js"></script>
</body>
</html>
